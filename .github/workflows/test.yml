name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  unit:
    name: Unit & contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No lockfile is committed; mero-icons pins react 18 peer while the
      # app is on react 19, so plain `npm install` refuses to resolve.
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  ui-e2e:
    name: Browser e2e against live merod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Download latest merod release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName -q '.[0].tagName')
          URL=$(gh release view "$TAG" --repo calimero-network/core --json assets -q '.assets[] | select(.name | test("merod_x86_64-unknown-linux-gnu\\.tar\\.gz$")) | .url')
          curl -sL "$URL" | tar xz && chmod +x ./merod

      - name: Init node with embedded auth
        run: ./merod --home ./ui-node --node ui init --auth-mode embedded --server-port 4081 --swarm-port 4082

      # The UI is served from vite preview (port 4173), a different origin
      # than the node, so the node must allow cross-origin requests.
      - name: Allow all CORS origins on the node
        run: sed -i 's/allow_all_origins = false/allow_all_origins = true/' ./ui-node/ui/config.toml

      - name: Start node and wait for auth health
        run: |
          ./merod --home ./ui-node --node ui run > merod.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4081/auth/health > /dev/null; then
              echo "node healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "node never became healthy" >&2
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e
        run: NODE_URL=http://localhost:4081 npx playwright test

      - name: Dump merod log on failure
        if: failure()
        run: cat merod.log
