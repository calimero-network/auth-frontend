name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  unit:
    name: Unit & contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No lockfile is committed; mero-icons pins react 18 peer while the
      # app is on react 19, so plain `npm install` refuses to resolve.
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  ui-e2e:
    name: Browser e2e against live merod
    runs-on: ubuntu-latest
    env:
      # Admin credentials for the node. On core >= rc.17 `merod init` reads
      # these from its environment and mints the admin root key up front (the
      # login path never mints keys; there is no setup code anymore).
      MERO_AUTH_ADMIN_USER: dev
      MERO_AUTH_ADMIN_PASSWORD: dev-password
      # Transitional (remove once the latest core release is >= rc.17): this
      # job downloads the LATEST merod release, and releases up to rc.16
      # still gate the first login on a bootstrap secret. The "Provision
      # admin account" step below presents it; rc.17+ ignores the field.
      MERO_AUTH_BOOTSTRAP_SECRET: ui-e2e-ci-bootstrap
      # Credentials the Playwright spec logs in with (live-login.spec.ts reads
      # MERO_E2E_USER / MERO_E2E_PASS). Password must satisfy the min length.
      MERO_E2E_USER: dev
      MERO_E2E_PASS: dev-password
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Download latest merod release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName -q '.[0].tagName')
          URL=$(gh release view "$TAG" --repo calimero-network/core --json assets -q '.assets[] | select(.name | test("merod_x86_64-unknown-linux-gnu\\.tar\\.gz$")) | .url')
          curl -sL "$URL" | tar xz && chmod +x ./merod

      - name: Init node with embedded auth
        run: ./merod --home ./ui-node --node ui init --auth-mode embedded --server-port 4081 --swarm-port 4082

      # The UI is served from vite preview (port 4173), a different origin
      # than the node, so the node must allow cross-origin requests.
      - name: Allow all CORS origins on the node
        run: sed -i 's/allow_all_origins = false/allow_all_origins = true/' ./ui-node/ui/config.toml

      - name: Start node and wait for auth health
        run: |
          ./merod --home ./ui-node --node ui run > merod.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4081/auth/health > /dev/null; then
              echo "node healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "node never became healthy" >&2
          exit 1

      # Version-portable admin provisioning: on core >= rc.17 the account was
      # already minted at init from MERO_AUTH_ADMIN_* and this is a plain
      # login (the stale bootstrap_secret field is ignored); on <= rc.16 this
      # very request mints the root key via the bootstrap secret. Either way
      # it must return a token — and afterwards the UI login the spec drives
      # is an ordinary existing-user authentication, which is all the UI
      # supports now that the setup-code field is gone.
      - name: Provision admin account (works on rc.16 and rc.17+)
        run: |
          BODY=$(jq -n --arg u "$MERO_E2E_USER" --arg p "$MERO_E2E_PASS" \
            --arg s "$MERO_AUTH_BOOTSTRAP_SECRET" --argjson ts "$(date +%s)" \
            '{auth_method: "user_password", public_key: $u,
              client_name: "ui-e2e-ci", permissions: ["admin"], timestamp: $ts,
              provider_data: {username: $u, password: $p, bootstrap_secret: $s}}')
          RESP=$(curl -fsS -m 10 -X POST http://localhost:4081/auth/token \
            -H 'Content-Type: application/json' -d "$BODY") || {
              echo "::error::admin provisioning/login failed"; exit 1; }
          TOKEN=$(echo "$RESP" | jq -r '.data.access_token // empty')
          [ -n "$TOKEN" ] || { echo "::error::no token: $RESP"; exit 1; }
          echo "admin account ready for user $MERO_E2E_USER"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e
        run: |
          NODE_URL=http://localhost:4081 \
          npx playwright test

      - name: Dump merod log on failure
        if: failure()
        run: cat merod.log
